name: pack-stdlib

# Smoke-test the packer against a stock MonolithPy 3.14 install (stdlib
# only - no extra pip packages) on Windows and macOS. Pulls the most
# recent matching artifact from Nuitka/MonolithPy's 3.14 branch and runs
# pack_embed end-to-end, then builds and runs the sample exe.
#
# Linux is intentionally skipped for now: the upstream artifact is 7+ GB
# (much larger than Windows/macOS) and a few packer paths haven't been
# exercised against it yet.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:00 UTC, to catch breakage from upstream MonolithPy
    # changes even when this repo isn't touched.
    - cron: '0 6 * * 1'

jobs:
  pack-stdlib:
    name: pack-stdlib (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025-vs2026
            artifact: MonolithPy314_windows_x64
          - os: macos-26
            artifact: MonolithPy314_mac_arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Get MonolithPy artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          repo: Nuitka/MonolithPy
          workflow: main.yml
          workflow_conclusion: success
          branch: 3.14
          name: ${{ matrix.artifact }}
          path: monolithpy314

      - name: Restore POSIX executable bits
        if: runner.os != 'Windows'
        shell: bash
        run: |
          find monolithpy314 -type f \( -name 'python' -o -name 'python3' \
              -o -name 'python3.*' \) -exec chmod +x {} \;

      - name: Pack stdlib-only bundle
        run: python pack_embed.py

      - name: Set up MSVC for sample build
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build sample exe
        shell: bash
        run: |
          cmake -S dist/embed_bundle/samples -B sample_build \
              -DCMAKE_BUILD_TYPE=Release
          cmake --build sample_build --config Release

      - name: Smoke-test sample exe
        shell: bash
        run: |
          exe=$(find sample_build -type f \
              \( -name 'embed_sample' -o -name 'embed_sample.exe' \) \
              | head -1)
          if [ -z "$exe" ]; then
              echo "embed_sample binary not found under sample_build/"
              find sample_build -maxdepth 4 -type f
              exit 1
          fi
          ls -la "$exe"
          "$exe" -c "import sys, os, json, ssl, codecs, sqlite3, zlib, hashlib, urllib.parse; print('python', sys.version.split()[0]); print('stdlib smoke OK')"

      - name: Upload bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embed_bundle-${{ matrix.os }}-${{ github.run_id }}
          path: dist/embed_bundle/
          if-no-files-found: ignore

      - name: Upload sample build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embed_sample_build-${{ matrix.os }}-${{ github.run_id }}
          path: sample_build/
          if-no-files-found: ignore

  pack-universal-arch:
    name: pack-universal-${{ matrix.arch }} (macos-26)
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            artifact: MonolithPy314_mac_arm64
          - arch: x86_64
            artifact: MonolithPy314_mac_x86_64
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Get MonolithPy ${{ matrix.arch }} artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          repo: Nuitka/MonolithPy
          workflow: main.yml
          workflow_conclusion: success
          branch: 3.14
          name: ${{ matrix.artifact }}
          # rebuildpython writes absolute paths into link.json. The two
          # matrix legs run on separate runners, so use the same install
          # path for both arches to keep generated bundle structure stable.
          path: monolithpy314

      - name: Restore POSIX executable bits
        shell: bash
        run: |
          find monolithpy314 -type f \( -name 'python' -o -name 'python3' \
              -o -name 'python3.*' \) -exec chmod +x {} \;

      - name: Pack ${{ matrix.arch }} bundle
        # Keep the output path identical too; the uploaded artifact name
        # distinguishes arches after each isolated matrix job completes.
        run: python pack_embed.py --install monolithpy314 --out-dir dist/embed_bundle

      - name: Upload ${{ matrix.arch }} bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embed_bundle-macos-${{ matrix.arch }}-${{ github.run_id }}
          path: dist/embed_bundle/
          if-no-files-found: ignore

  pack-universal-merge:
    name: pack-universal-merge (macos-26)
    needs: pack-universal-arch
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download arm64 bundle
        uses: actions/download-artifact@v4
        with:
          name: embed_bundle-macos-arm64-${{ github.run_id }}
          path: dist/embed-arm64

      - name: Download x86_64 bundle
        uses: actions/download-artifact@v4
        with:
          name: embed_bundle-macos-x86_64-${{ github.run_id }}
          path: dist/embed-x86

      - name: Lipo into universal bundle
        run: python pack_embed.py --lipo dist/embed-arm64 dist/embed-x86 --out-dir dist/embed_bundle

      - name: Build universal sample
        shell: bash
        run: |
          # Force both slices into the sample exe so we can actually
          # exercise the x86_64 lipo'd archives - otherwise the runner's
          # native arch (arm64) is the only one that gets built.
          cmake -S dist/embed_bundle/samples -B sample_build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build sample_build --config Release

      - name: Smoke-test universal sample
        shell: bash
        run: |
          exe=$(find sample_build -type f -name 'embed_sample' | head -1)
          if [ -z "$exe" ]; then
              echo "embed_sample binary not found under sample_build/"
              find sample_build -maxdepth 4 -type f
              exit 1
          fi
          ls -la "$exe"
          # Assert the binary is actually fat - a single-arch binary
          # would still smoke-test OK on its native arch but defeats
          # the point of the universal bundle.
          lipo -info "$exe"
          lipo -info "$exe" | grep -q 'arm64' || { echo 'missing arm64 slice'; exit 1; }
          lipo -info "$exe" | grep -q 'x86_64' || { echo 'missing x86_64 slice'; exit 1; }
          # Make sure Rosetta is available so arch -x86_64 works on the
          # arm64 runner; it's preinstalled on macos-14+, but install
          # defensively in case the runner image changes.
          if ! arch -x86_64 /usr/bin/true 2>/dev/null; then
              softwareupdate --install-rosetta --agree-to-license
          fi
          for slice in arm64 x86_64; do
              echo "=== smoke-testing $slice slice ==="
              arch -"$slice" "$exe" -c "import sys, os, json, ssl, codecs, sqlite3, zlib, hashlib, urllib.parse; print('python', sys.version.split()[0]); print('machine', os.uname().machine); print('stdlib smoke OK')"
          done

      - name: Upload universal bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embed_bundle-macos-universal-${{ github.run_id }}
          path: dist/embed_bundle/
          if-no-files-found: ignore

      - name: Upload universal sample build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embed_sample_build-macos-universal-${{ github.run_id }}
          path: sample_build/
          if-no-files-found: ignore
